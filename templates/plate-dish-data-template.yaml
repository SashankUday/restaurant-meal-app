  menu:
    status: not_supplied # REQUIRED: verified | not_supplied
    source_name: null
    source_url: null
    verified_on: null
    verified_by: null
  ingredients:
    status: not_supplied
    source_name: null
    source_url: null
    verified_on: null
    verified_by: null
  pricing:
    status: not_supplied
    source_name: null
    source_url: null
    verified_on: null
    verified_by: null
  nutrition:
    status: not_supplied
    source_name: null
    source_url: null
