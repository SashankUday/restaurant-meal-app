# Plate restaurant and dish catalogue template
# Copy this file for research/import work. Keys under restaurant and dish map to
# the simplified live schema; quality_control is an editorial checklist only.

quality_control:
  restaurant_identity_verified: false
  menu_verified: false
  price_reviewed: false
  nutrition_reviewed: false
  allergens_reviewed: false
  availability_reviewed: false
  image_rights_confirmed: false
  reviewer: ""
  reviewed_on: null # YYYY-MM-DD

restaurant:
  id: null # SYSTEM-MANAGED
  name: "" # REQUIRED
  chain_name: null
  branch_name: null
  area: "" # REQUIRED
  cuisine: [] # REQUIRED; stored as JSON
  latitude: null # REQUIRED
  longitude: null # REQUIRED
  city: "Oxford"
  country_code: "GB"
  description: ""
  created_at: null # SYSTEM-MANAGED
  updated_at: null # SYSTEM-MANAGED

dish:
  id: null # SYSTEM-MANAGED
  restaurant_id: null # REQUIRED
  name: "" # REQUIRED
  price: null # Nullable; never use 0 as an unknown-price placeholder
  description: "" # Full menu description
  short_description: "" # Curated card blurb
  course: "mains" # starters | mains | sides | desserts | drinks
  menu_position: 0
  diets: []
  allergens: []
  allergen_details:
    official_allergens: []
    may_contain: []
    cross_contamination_risk: null
    separate_preparation_available: null
    notes: null
  nutrition:
    calories_kcal: null
    protein_g: null
    carbohydrates_g: null
    sugars_g: null
    fibre_g: null
    total_fat_g: null
    saturated_fat_g: null
    monounsaturated_fat_g: null
    polyunsaturated_fat_g: null
    trans_fat_g: null
    sodium_mg: null
    salt_g: null
    cholesterol_mg: null
    water_g: null
    micronutrients: {}
  ingredients: []
  meal_occasions: []
  crowd_tags: {} # SYSTEM-MANAGED catalogue counts
  official_image_url: null
  availability:
    currently_available: true
    seasonal: null
    limited_edition: null
    breakfast_only: null
    lunch_only: null
    service_windows: []
    out_of_stock: null
    available_from: null
    available_until: null
    regions: []
    notes: null
  hidden_search_tokens: [] # Human-reviewed synonyms; searchable, not displayed
  data_sources:
    menu:
      status: "not_supplied"
      source_url: null
      source_name: null
      verified_by: null
      verified_on: null
    pricing:
      status: "not_supplied"
      source_url: null
      source_name: null
      verified_by: null
      verified_on: null
    nutrition:
      status: "not_supplied"
      source_url: null
      source_name: null
      verified_by: null
      verified_on: null
    allergens:
      status: "not_supplied"
      source_url: null
      source_name: null
      verified_by: null
      verified_on: null
    availability:
      status: "not_supplied"
      source_url: null
      source_name: null
      verified_by: null
      verified_on: null
    media:
      status: "not_supplied"
      source_url: null
      source_name: null
      rights_confirmed: false
      verified_by: null
      verified_on: null
  sponsored: false
  created_at: null # SYSTEM-MANAGED
  updated_at: null # SYSTEM-MANAGED

# User meal fields live in ratings/rating_photos, not in the dish record.
meal_log_shape:
  user_id: null
  dish_id: null
  score: null # REQUIRED, 0-10
  tags: [] # Up to 8
  comment: ""
  visited_at: null
  would_order_again: null
  photos: [] # Private rating_photos/storage records
  created_at: null # SYSTEM-MANAGED
